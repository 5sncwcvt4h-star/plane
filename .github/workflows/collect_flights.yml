name: Collect Flight Data

on:
  schedule:
    # 每分钟触发一次
    # 注意：虽然设置了每分钟，但受限于 GitHub Actions 的系统调度机制，实际的最短运行间隔通常在 5 分钟左右。
    - cron: '* * * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上手动触发运行

jobs:
  collect:
    runs-on: ubuntu-latest
    
    # 授予 GitHub Action 往仓库写文件（Commit 和 Push）的权限
    permissions:
      contents: write

    steps:
      - name: 检出代码 (Checkout Repository)
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行采集脚本并获取航班数据
        env:
          OPENSKY_USERNAME: ${{ secrets.OPENSKY_USERNAME }}
          OPENSKY_PASSWORD: ${{ secrets.OPENSKY_PASSWORD }}
        run: python get_plane.py

      - name: 将新采集的数据提交并推送到 GitHub 仓库
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Auto-update flight data [skip ci]" || echo "No changes to commit"
          git push
